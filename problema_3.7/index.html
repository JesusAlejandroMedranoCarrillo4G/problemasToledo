<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.7 — Becas Universitarias</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-blob"></div>
<div class="card">
    <a href="../index.html" class="btn-volver">← Inicio</a>
    <div class="problem-chip">Problema 3.7</div>
    <h1>🎓 Becas Universitarias</h1>
    <p class="description">Determina la beca mensual que recibirá un alumno según su edad y promedio.</p>

    <div class="form-group">
        <label for="edad">Edad del alumno</label>
        <input type="number" id="edad" placeholder="Ej: 20" min="0" max="100">
    </div>
    <div class="form-group">
        <label for="promedio">Promedio (0–10)</label>
        <input type="number" id="promedio" placeholder="Ej: 8.5" min="0" max="10" step="0.1">
    </div>

    <button onclick="calcular()">Calcular Beca</button>
    <div id="resultado" class="resultado"></div>

    <div class="divider"></div>
    <div class="info-box">
        <strong>Mayor de 18:</strong> promedio ≥9 → $2000 | ≥7.5 → $1000 | ≥6 → $500 | &lt;6 → carta<br>
        <strong>18 o menor:</strong> promedio ≥9 → $3000 | ≥8 → $2000 | ≥6 → $1000 | &lt;6 → carta
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
